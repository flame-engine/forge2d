name: forge2d
version: 0.15.0
description: A 2D physics engine for Dart, binding to the native Box2D v3 library. Also works with the Flame game engine in Flutter.
homepage: https://github.com/flame-engine/forge2d
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.4
  hooks: ^2.0.0
  logging: ^1.3.0
  meta: ^1.16.0
  native_toolchain_c: ^0.19.0
  vector_math: ^2.1.4

dev_dependencies:
  dartdoc: ^8.3.4
  flame_lint: ^1.4.1
  test: ^1.26.3

# Bundles the WebAssembly module as an asset in Flutter apps, so Flutter
# web needs no setup step. Non-Flutter tooling ignores this section.
flutter:
  assets:
    - lib/src/backend/wasm/box2d.wasm
