name: forge2d
version: 0.14.2+1
description: A 2D physics engine for Dart, binding to the native Box2D v3 library. Also works with the Flame game engine in Flutter.
homepage: https://github.com/flame-engine/forge2d
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.4
  hooks: ^2.1.0
  logging: ^1.3.0
  meta: ^1.16.0
  native_toolchain_c: ^0.19.3
  vector_math: ^2.1.4

dev_dependencies:
  dartdoc: ^8.3.4
  flame_lint: ^1.4.1
  test: ^1.26.3
